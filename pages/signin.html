<!-- HeroScene (BigTitle - Connexion) -->
<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1 class="bigtitle">Connexion</h1>
    </div>
</div>

<!-- Début du Formulaire de Connexion -->
<div class="container">
    <form>
        <div class="mb-3">
            <label for="EmailInput" class="form-label">Email</label>
            <input type="email" class="form-control input-field" id="EmailInput" placeholder="contact@email.com">
        </div>
        <div class="mb-3">
            <label for="PasswordInput" class="form-label">Mot de Passe</label>
            <input type="password" class="form-control input-field" id="PasswordInput">
        </div>
        <div class="text-center pt-3">
            <button type="submit" class="btn btn-primary btn-font-secondary">Connexion</button>
        </div>
    </form>
</div>
