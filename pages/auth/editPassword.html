<!-- HeroScene (BigTitle - Changement de mot de passe) -->
<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1 class="bigtitle">Changement de mot de passe</h1>
    </div>
</div>

<div class="container container-form-center p-2">
    <form class="form-container">
      <div class="mb-3">
        <label for="PasswordInput" class="form-label">Nouveau mot de passe</label>
        <input type="password" class="form-control input-field" id="PasswordInput" name="Password">
      </div>
      <div class="mb-3">
        <label for="ValidatePasswordInput" class="form-label">Confirmez votre mot de passe</label>
        <input type="password" class="form-control input-field" id="ValidatePasswordInput" name="PasswordConfirm">
      </div>
      <div class="text-center pt-3">
        <a href="/account" class="btn btn-secondary btn-font-secondary">Retour</a>
        <button type="submit" class="btn btn-primary btn-font-secondary">Changer mon mot de passe</button>
      </div>
    </form>
  </div>
