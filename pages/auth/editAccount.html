<!-- HeroScene (BigTitle - Modifier mes informations) -->
<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1 class="bigtitle">Modifier mes informations</h1>
    </div>
</div>

<div class="container container-form-center p-2">
    <form class="form-container">
      <div class="mb-3">
        <label for="NomInput" class="form-label">Votre nom</label>
        <input type="text" class="form-control input-field" id="NomInput" name="Nom">
      </div>
      <div class="mb-3">
        <label for="PrenomInput" class="form-label">Votre prénom</label>
        <input type="text" class="form-control input-field" id="PrenomInput" name="Prénom">
      </div>
      <div class="mb-3">
        <label for="EmailInput" class="form-label">Votre email <span>*</span></label>
        <input type="text" class="form-control input-field" id="EmailInput" placeholder="contact@email.com" name="Email">
      </div>
      <div class="text-center pt-3">
        <a href="#" class="btn btn-secondary btn-font-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary btn-font-secondary">Modifier mes informations</button>
      </div>
    </form>
  </div>
